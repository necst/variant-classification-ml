_target_: sklearn.linear_model.LogisticRegression

name: 'logreg'
penalty: 'l2'
C: 1.0 
solver: 'lbfgs'
max_iter: 1000 

class_weight: 'balanced'

random_state: 42
n_jobs: -1

sweep_params:
  model.C:
    type: range
    bounds: [1.0e-4, 100.0]
    value_type: float
    log_scale: True

  model.solver:
    type: choice
    values: ['lbfgs', 'saga']

  model.penalty:
    type: choice
    values: ['null', 'l2']
