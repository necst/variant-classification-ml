_target_: xgboost.XGBClassifier

name: 'xgboost'

n_estimators: 1500
max_depth: 5
learning_rate: 0.1
subsample: 0.7
colsample_bytree: 0.8
gamma: 0.5
min_child_weight: 5

random_state: 42

use_label_encoder: false
objective: 'multi:softprob'
eval_metric: 'mlogloss'
n_jobs: -1

early_stopping_rounds: 100
validation_size: 0.15

sweep_params:
  model.max_depth:
    type: range
    bounds: [3, 10]
    value_type: int

  model.learning_rate:
    type: range
    bounds: [0.01, 0.3]
    value_type: float
    log_scale: True

  model.subsample:
    type: range
    bounds: [0.5, 1.0]
    value_type: float

  model.colsample_bytree:
    type: range
    bounds: [0.6, 1.0]
    value_type: float

  model.min_child_weight:
    type: range
    bounds: [1, 10]
    value_type: int
