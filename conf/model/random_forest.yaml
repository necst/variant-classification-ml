_target_: sklearn.ensemble.RandomForestClassifier

name: 'randfor'

# Default hyperparameters
n_estimators: 200
max_depth: 10
min_samples_split: 2
min_samples_leaf: 1
max_features: 'sqrt' # Common default for classification

class_weight: 'balanced_subsample'

random_state: 42
n_jobs: -1

sweep_params:
  model.n_estimators:
    type: range
    bounds: [100, 800]
    value_type: int

  model.max_depth:
    type: range
    bounds: [5, 50]
    value_type: int

  model.min_samples_split:
    type: range
    bounds: [2, 20]
    value_type: int

  model.min_samples_leaf:
    type: range
    bounds: [1, 10]
    value_type: int

  model.max_features:
    type: choice
    values: ['sqrt', 'log2']
