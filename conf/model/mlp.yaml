_target_: sklearn.neural_network.MLPClassifier

name: 'mlp'

# Default hyperparameters
n_hidden_layers: 2
hidden_layer_size: 128
hidden_layer_sizes: [128, 128]
activation: relu
solver: adam
alpha: 0.0001  # L2 regularization term
learning_rate: adaptive
learning_rate_init: 0.001
max_iter: 1000
batch_size: 32
early_stopping: true
validation_fraction: 0.1
n_iter_no_change: 25
tol: 1e-4

random_state: 42
sweep_params:
  model.n_hidden_layers:
    type: range
    bounds: [1, 3]
    value_type: int
  model.hidden_layer_size:
    type: choice
    values: [32, 64, 128, 512]
    value_type: int
  model.alpha:
    type: range
    bounds: [0.00001, 0.001]
    value_type: float
    log_scale: true
  model.learning_rate_init:
    type: range
    bounds: [0.0001, 0.01]
    value_type: float
    log_scale: true
  model.batch_size:
    type: choice
    values: [32, 64, 128, 256, 512]
    value_type: int
