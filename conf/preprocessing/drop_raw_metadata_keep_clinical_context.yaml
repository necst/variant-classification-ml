name: drop_raw_metadata_keep_clinical_context

drop_feature_selectors:
  regex_pattern: '^(Unnamed: 0|hg18_pos|.*_score$|.*_pred_lab$|CADD_(raw|phred)$|Eigen-(raw|phred|PC-phred)|GERP\+\+_(NR|RS)$|phyloP(100way_vertebrate$|470way|17way)|phastCons|bStatistic|Reliability_index|M-CAP|MetaLR|MetaRNN|MVP|MPC|BayesDel|VARITY_(R|ER|ER_LOO)$|SIFT_converted_rankscore|Polyphen2_HDIV|Start|Stop|RS#|SubmitterCategories|PositionVCF|(?!ClinicalSignificance$|#chr_lab$|ref_lab$|alt_lab$|aaref_lab$|aaalt_lab$|clinvar_review_lab$|ReviewStatus_lab$|Type_lab$|Origin_lab$).*_lab$)'
  slice_by_name: []
  explicit_list: []
select_numeric_features: true
fill_na_strategy:
scaler: null
steps:

# Drops: index cols, hg18_pos, *_score, *_pred_lab, raw CADD/Eigen/GERP++/phyloP/phastCons/bStatistic/etc.,
# M-CAP/MetaLR/MetaRNN/MVP/MPC/BayesDel/VARITY/SIFT_converted/Polyphen2_HDIV, Start/Stop/RS#/SubmitterCategories/PositionVCF,
# and *_lab except target, basic allele labs, and clinical context labs (clinvar_review/ReviewStatus/Type/Origin).